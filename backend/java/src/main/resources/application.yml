server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:55432/tradelab
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false

python:
  parser:
    base-url: http://127.0.0.1:8001
